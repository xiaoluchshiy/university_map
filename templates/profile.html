<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Личный кабинет - UniMap</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='profile.css') }}">
</head>
<body>
    <!-- Навигация -->
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand logo" href="/">
                <i class="fas fa-graduation-cap"></i> UniMap
            </a>
            <div class="navbar-nav ml-auto">
                <a class="nav-link text-white" href="/map">
                    <i class="fas fa-map-marked-alt"></i> Карта
                </a>
                <a class="nav-link text-white" href="/favorites">
                    <i class="fas fa-heart"></i> Избранное
                </a>
                <a class="nav-link text-white" href="/logout">
                    <i class="fas fa-sign-out-alt"></i> Выйти
                </a>
            </div>
        </div>
    </nav>

    <div class="profile-container">
        <div class="profile-card">
            <div class="profile-header">
                <div class="profile-avatar">
                    <i class="fas fa-user"></i>
                </div>
                <h1 class="profile-name">{{ user.name }}</h1>
                <div class="profile-email">{{ user.email }}</div>
            </div>

            {% if user.about %}
            <div class="profile-about">
                <h5>О себе:</h5>
                <p>{{ user.about }}</p>
            </div>
            {% endif %}

            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-number">{{ favorite_count }}</div>
                    <div class="stat-label">Избранных университетов</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">{{ user.created_date.strftime('%d.%m.%Y') }}</div>
                    <div class="stat-label">Дата регистрации</div>
                </div>
            </div>

            <div class="action-buttons">
                <a href="/favorites" class="btn-action btn-primary">
                    <i class="fas fa-heart"></i> Мои избранные
                </a>
                <a href="/map" class="btn-action btn-outline">
                    <i class="fas fa-map-marked-alt"></i> Найти университеты
                </a>
                <a href="/" class="btn-action btn-outline">
                    <i class="fas fa-home"></i> На главную
                </a>
            </div>
        </div>
    </div>
    <div class="profile-container">
        <div class="task-import">
            <p>Импорт задач</p>
            <form class="send" method="post" enctype="multipart/form-data" id="uploadForm">
                <input type="file" accept=".csv" name="file" id="csvFile" required />
                <button type="submit" id="submitBtn">Отправить</button>
            </form>
        </div>
        <a href="/export" class="btn-action btn-primary">
            <i class="fas fa-download"></i> Экспорт
        </a>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</body>
</html>
