<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniMap - Карта университетов</title>

    <!-- Яндекс Карты -->
    <script src="https://api-maps.yandex.ru/2.1/?apikey=58536896-e96c-40b7-a0c7-f6717d975d29&lang=ru_RU"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='index.css') }}">
</head>
<body>
    <!-- ПАНЕЛЬ УПРАВЛЕНИЯ -->
    <div class="control-panel">
        {% if not current_user.is_authenticated %}
        <a href="/login" class="control-btn"><i class="fas fa-sign-in-alt"></i> Войти</a>
        <a href="/register" class="control-btn"><i class="fas fa-user-plus"></i> Регистрация</a>
        {% endif %}
    </div>

    {% if current_user.is_authenticated %}
    <!-- МЕНЮ ПОЛЬЗОВАТЕЛЯ -->
    <div class="user-menu">
        <div class="user-info"><i class="fas fa-user"></i> {{ current_user.name }}</div>
        <a href="/profile" class="control-btn" style="background: rgba(102,126,234,0.1);"><i class="fas fa-user-circle"></i> Кабинет</a>
        <a href="/favorites" class="control-btn" style="background: rgba(231,76,60,0.1);"><i class="fas fa-heart"></i> Избранное</a>
        <a href="/logout" class="control-btn" style="background: rgba(108,117,125,0.1);"><i class="fas fa-sign-out-alt"></i> Выйти</a>
    </div>
    {% endif %}

    <!-- ПАНЕЛЬ ФИЛЬТРОВ -->
    <form class="filter-panel" method="get" action="{{ url_for('index') }}">
        <div class="filter-title"><i class="fas fa-filter"></i> Фильтры</div>

        <div class="filter-group">
            <label class="filter-label">Тип университета:</label>
            <select class="filter-select" name="type">
                <option value="all" {% if selected_type == 'all' %}selected{% endif %}>Все типы</option>
                <option value="federal" {% if selected_type == 'federal' %}selected{% endif %}>Федеральные</option>
                <option value="technical" {% if selected_type == 'technical' %}selected{% endif %}>Технические</option>
                <option value="medical" {% if selected_type == 'medical' %}selected{% endif %}>Медицинские</option>
                <option value="pedagogical" {% if selected_type == 'pedagogical' %}selected{% endif %}>Педагогические</option>
                <option value="humanitarian" {% if selected_type == 'humanitarian' %}selected{% endif %}>Гуманитарные</option>
                <option value="economic" {% if selected_type == 'economic' %}selected{% endif %}>Экономические</option>
                <option value="architecture" {% if selected_type == 'architecture' %}selected{% endif %}>Архитектурные</option>
                <option value="linguistic" {% if selected_type == 'linguistic' %}selected{% endif %}>Лингвистические</option>
                <option value="social" {% if selected_type == 'social' %}selected{% endif %}>Социальные</option>
                <option value="veterinary" {% if selected_type == 'veterinary' %}selected{% endif %}>Ветеринарные</option>
                <option value="food_tech" {% if selected_type == 'food_tech' %}selected{% endif %}>Пищевые технологии</option>
                <option value="technology" {% if selected_type == 'technology' %}selected{% endif %}>Технологические</option>
                <option value="art" {% if selected_type == 'art' %}selected{% endif %}>Искусство</option>
                <option value="culture" {% if selected_type == 'culture' %}selected{% endif %}>Культура</option>
                <option value="space" {% if selected_type == 'space' %}selected{% endif %}>Космические</option>
            </select>
        </div>

        {% if current_user.is_authenticated %}
        <div class="filter-group">
        <div class="filter-checkbox">
            <input type="checkbox" id="onlyFavorites" name="fav" value="1" {% if only_favorites == '1' %}checked{% endif %}>
            <label for="onlyFavorites">Только избранные</label>
        </div>
</div>
        {% endif %}

        <button type="submit"><i class="fas fa-check"></i> Применить</button>
    </form>

    <!-- КАРТА -->
    <div id="map"></div>

    <script>
        ymaps.ready(initMap);

        function initMap() {
            var map = new ymaps.Map("map", {
                center: [55.7558, 37.6176],
                zoom: 10,
                controls: []
            });

            const icons = {
                'federal':'🏛️','technical':'🔧','medical':'⚕️','pedagogical':'👨‍🏫','humanitarian':'📚',
                'economic':'💼','architecture':'🏗️','linguistic':'🔤','social':'👥','veterinary':'🐾',
                'food_tech':'🍕','technology':'⚙️','art':'🎨','culture':'🎭','space':'🚀',
                'art': '🎨', 'culture': '🎭', 'law': '⚖️', 'sport': '⚽', 'agricultural': '🌾'
            };

            const colors = {
                'federal':'#4a6fc9','technical':'#e74c3c','medical':'#2ecc71','pedagogical':'#9b59b6','humanitarian':'#3498db',
                'economic':'#f39c12','architecture':'#e67e22','linguistic':'#1abc9c','social':'#95a5a6','veterinary':'#8e44ad',
                'food_tech':'#d35400','technology':'#c0392b','art':'#e84393','culture':'#0984e3','space':'#8e44ad'
            };

            {% for place in places %}
            var placemark = new ymaps.Placemark([{{ place.lat }}, {{ place.lon }}], {
                balloonContentHeader: `<div style="background:#667eea;color:white;padding:10px;border-radius:10px 10px 0 0;font-weight:700;">${icons['{{ place.type }}']} {{ place.title }}</div>`,
                balloonContentBody: `
                    <div style="padding:10px;">
                        <div style="margin-bottom:5px;"><strong>Тип:</strong> {{ place.type }}</div>
                        <div style="margin-bottom:5px;"><strong>Описание:</strong> {{ place.description }}</div>
                        {% if place.website %}
                        <a href="{{ place.website }}" target="_blank" style="color:#10b981;text-decoration:none;">Перейти на сайт</a>
                        {% endif %}
                        <form method="post" action="{{ url_for('toggle_favorite', university_id=place.id) }}" style="margin-top:5px;">
                            <button type="submit" style="background:{{ 'red' if place.is_favorite else 'white' }};color:{{ 'white' if place.is_favorite else 'red' }};border:2px solid red;padding:5px 10px;border-radius:5px;">
                                {{ 'В избранном' if place.is_favorite else 'В избранное' }}
                            </button>
                        </form>
                    </div>
                `,
                hintContent: "{{ place.title }}"
            }, {
                preset: 'islands#circleIcon',
                iconColor: colors['{{ place.type }}']
            });

            map.geoObjects.add(placemark);
            {% endfor %}
        }
    </script>
</body>
</html>
